<div th:include="layout/common/script :: load()"></div>

<script th:inline="javascript">
    // JWT 토큰을 파싱하는 함수
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        return JSON.parse(jsonPayload);
    };

    // 로컬 스토리지에서 액세스 토큰을 가져와서 유저명을 파싱하고 출력
    var token = localStorage.getItem('accessToken');
    var username = parseJwt(token).sub;
    console.log("Username: ", username);
    document.querySelector('.d-block').textContent = username + " 관리자";

    $(document).ready(function () {
        // 기존 로직

        // 선택된 행들을 저장하는 배열
        var selectedRows = [];
        // 표시 버튼의 상태 (열림/닫힘)
        var isOpen = false;

        // 선택된 행의 수를 업데이트하고, 배너의 위치와 표시 상태를 정하는 함수
        var updateSelectedCount = function() {
            var navbarHeight = $('.main-header.navbar.navbar-expand.navbar-white.navbar-light').outerHeight();
            $('#selectedRowsBanner').css('top', navbarHeight);
            // 체크된 rowCheckbox의 개수를 세어서 카운트를 업데이트
            var checkedCount = $('.rowCheckbox:checked').length;
            $('#selectionCount').text(checkedCount + " 행이 선택되었습니다.");
            if (checkedCount > 0) {
                $('#selectedRowsBanner').show();
            } else {
                $('#selectedRowsBanner').hide();
            }
        };

        // 표시 버튼을 클릭하면 열림/닫힘 상태를 토글하고, 컬럼 선택 영역을 표시/숨김
        $('#displayButton').click(function() {
            isOpen = !isOpen;
            if (isOpen) {
                $('#columnSelection').show();
            } else {
                $('#columnSelection').hide();
            }
        });

        // 표시 버튼이나 컬럼 선택 영역 외의 곳을 클릭하면 컬럼 선택 영역을 숨김
        $(document).click(function(event) {
            if (!$(event.target).closest('#displayButton').length && !$(event.target).closest('#columnSelection').length) {
                isOpen = false;
                $('#columnSelection').hide();
            }
        });

        // 컬럼 체크박스를 클릭하면 해당 컬럼을 표시/숨김
        $('#columnSelection').on('click', '.column-checkbox', function () {
            var key = $(this).attr('name');
            $('.' + key).toggleClass('hidden');
        });

        // "모두 선택" 체크박스를 클릭하면 모든 행을 선택/선택 해제
        $("#selectAllCheckbox").click(function(){
            $(".rowCheckbox").prop('checked', $(this).prop('checked'));
            selectedRows = [];
            if ($(this).prop('checked')) {
                $('.rowCheckbox').each(function() {
                    selectedRows.push(parseInt($(this).attr('name')));
                });
            }
            updateSelectedCount();
        });

        // 행 체크박스를 클릭하면 해당 행을 선택/선택 해제
        $(document).on('click', '.rowCheckbox', function(){
            var id = parseInt($(this).attr('name'));
            if ($(this).prop('checked')) {
                selectedRows.push(id);
            } else {
                var index = selectedRows.indexOf(id);
                if (index > -1) {
                    selectedRows.splice(index, 1);
                }
            }

            // 모든 행이 선택되었으면 "모두 선택" 체크박스를 체크, 그렇지 않으면 체크 해제
            if ($('.rowCheckbox:checked').length == $('.rowCheckbox').length) {
                $('#selectAllCheckbox').prop('checked', true);
            } else {
                $('#selectAllCheckbox').prop('checked', false);
            }
            updateSelectedCount();
        });

        // 사용자 정보 키
        var userKeys = ['id', 'username', 'email', 'roles', 'userRealName', 'userGender', 'userPhone', 'userAddress', 'userBirth', 'userLikePlayer', 'userMarketing', 'provider', 'providerId'];

        // 컬럼 선택 영역에 체크박스와 라벨을 추가
        $.each(userKeys, function(index, key) {
            var label = $('<label/>').addClass('flex justify-start items-center text-truncate hover:bg-gray-100 px-4 py-2');
            var div = $('<div/>').addClass('text-teal-600 mr-3');
            var checkbox = $('<input/>').attr('type', 'checkbox').attr('name', key).addClass('form-checkbox focus:outline-none focus:shadow-outline column-checkbox').prop('checked', true);
            var divText = $('<div/>').addClass('select-none text-gray-700').text(key);

            div.append(checkbox);
            label.append(div, divText);
            $('#columnSelection').append(label);
        });

        var accessToken = localStorage.getItem('accessToken');

        // 사용자 정보를 가져와서 테이블에 추가
        $.ajax({
            url: "/admin/layout/getUserInfo",
            method: "GET",
            headers: {
                "Authorization": "Bearer " + accessToken
            },
            success: function(data) {
                var users = data;
                $.each(users, function(i, principalDetails) {
                    var user = principalDetails.user;
                    var tr = $('<tr/>');
                    tr.append("<td class='border-dashed border-t border-gray-200 px-3'><label class='text-teal-500 inline-flex justify-between items-center hover:bg-gray-200 px-2 py-2 rounded-lg cursor-pointer'><input type='checkbox' class='form-checkbox rowCheckbox focus:outline-none focus:shadow-outline' name='" + user.userId + "'></label></td>");

                    $.each(user, function(key, value) {
                        if (userKeys.includes(key)) {
                            tr.append("<td class='border-dashed border-t border-gray-200 " + key + "'><span class='text-gray-700 px-6 py-3 flex items-center'>" + value + "</span></td>");
                        }
                    });

                    $('#userTableBody').append(tr);
                });
            }
        });

        // 섹션1 사진 목록 탭 클릭 이벤트 추가
        $('#nav-1 a[href="#/section1photos"]').click(function (event) {
            event.preventDefault(); // 기본 동작 방지
            $('#listContent').hide(); // User 목록을 숨김
            $('#section1PhotoForm').hide(); // 섹션1 사진 등록 폼을 숨김
            loadSection1Photos(); // 섹션1 사진 데이터 로드 함수 호출
            $('#section1PhotoList').show(); // 섹션1 사진 목록을 표시
        });

        // 섹션1 사진 등록 탭 클릭 이벤트 추가
        $('#nav-1 a[href="#/section1photoregistration"]').click(function (event) {
            event.preventDefault(); // 기본 동작 방지
            $('#listContent').hide(); // User 목록을 숨김
            $('#section1PhotoList').hide(); // 섹션1 사진 목록을 숨김
            $('#section1PhotoForm').show(); // 섹션1 사진 등록 폼을 표시
        });

        // 다른 탭 클릭 시 섹션1 사진 등록 폼과 목록을 숨김
        $('#nav-1 a[href!="#/section1photos"][href!="#/section1photoregistration"]').click(function (event) {
            $('#section1PhotoForm').hide(); // 섹션1 사진 등록 폼을 숨김
            $('#section1PhotoList').hide(); // 섹션1 사진 목록을 숨김
            $('#listContent').show(); // User 목록을 표시
        });

        function loadSection1Photos() {
            var accessToken = localStorage.getItem('accessToken');
            $.ajax({
                url: "/admin/layout/getSection1Photos", // 섹션1 사진 데이터를 가져오는 API 엔드포인트
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + accessToken
                },
                success: function (data) {
                    var photos = data; // 받은 데이터
                    var content = '<div class="container mx-auto py-6 px-4">';
                    content += '<h1 class="text-3xl py-4 border-b mb-10">섹션1 사진 목록</h1>';
                    content += '<div class="overflow-x-auto bg-white rounded-lg shadow overflow-y-auto relative" style="height: 405px;">';
                    content += '<table class="border-collapse table-auto w-full whitespace-no-wrap bg-white table-striped relative">';
                    content += '<thead>';
                    content += '<tr class="text-left">';
                    content += '<th class="py-2 px-3 sticky top-0 border-b border-gray-200 bg-gray-100">';
                    content += '<label class="text-teal-500 inline-flex justify-between items-center hover:bg-gray-200 px-2 py-2 rounded-lg cursor-pointer">';
                    content += '<input id="selectAllCheckboxPhotos" type="checkbox" class="form-checkbox focus:outline-none focus:shadow-outline">';
                    content += '</label>';
                    content += '</th>';

                    content += '<template>';
                    content += '<th class="bg-gray-100 sticky top-0 border-b border-gray-200 px-6 py-2 text-gray-600 font-bold tracking-wider uppercase text-xs"></th>';
                    content += '</template>';

                    content += '<th class="bg-gray-100 sticky top-0 border-b border-gray-200 px-6 py-2 text-gray-600 font-bold tracking-wider uppercase text-xs cpTitle">파일명</th>';
                    content += '<th class="bg-gray-100 sticky top-0 border-b border-gray-200 px-6 py-2 text-gray-600 font-bold tracking-wider uppercase text-xs cpContent">파일 경로</th>';
                    content += '<th class="bg-gray-100 sticky top-0 border-b border-gray-200 px-6 py-2 text-gray-600 font-bold tracking-wider uppercase text-xs tableGb">테이블 구분</th>';
                    content += '</tr>';
                    content += '</thead>';
                    content += '<tbody>';

                    // 파일 데이터 추가
                    $.each(photos, function (i, photo) {
                        // 사진 URL 추출
                        var imgSrc = $(photo.cpContent).find('img').attr('src');

                        content += '<tr>';
                        content += '<td class="border-dashed border-t border-gray-200 px-3"><label class="text-teal-500 inline-flex justify-between items-center hover:bg-gray-200 px-2 py-2 rounded-lg cursor-pointer"><input type="checkbox" class="form-checkbox rowCheckbox focus:outline-none focus:shadow-outline" name="' + photo.cp_idx + '"></label></td>';
                        content += '<td class="border-dashed border-t border-gray-200 cpTitle"><span class="text-gray-700 px-6 py-3 flex items-center">' + photo.cpTitle + '</span></td>';
                        content += '<td class="border-dashed border-t border-gray-200 cpContent"><span class="text-gray-700 px-6 py-3 flex items-center"><img src="' + imgSrc + '" style="max-width: 100px;"></span></td>';
                        content += '<td class="border-dashed border-t border-gray-200 tableGb"><span class="text-gray-700 px-6 py-3 flex items-center">' + photo.tableGb + '</span></td>';
                        content += '</tr>';
                    });

                    content += '</tbody>';
                    content += '</table>';
                    content += '</div>';
                    content += '</div>';

                    // 기존 콘텐츠를 섹션1 사진 목록으로 교체
                    $('#section1PhotoList').html(content);

                    // 체크박스 이벤트 다시 바인딩
                    bindCheckboxEvents();
                }
            });
        }

        function bindCheckboxEvents() {
            // "모두 선택" 체크박스를 클릭하면 모든 행을 선택/선택 해제
            $("#selectAllCheckboxPhotos").click(function(){
                $(".rowCheckbox").prop('checked', $(this).prop('checked'));
                selectedRows = [];
                if ($(this).prop('checked')) {
                    $('.rowCheckbox').each(function() {
                        selectedRows.push(parseInt($(this).attr('name')));
                    });
                }
                updateSelectedCount();
            });

            // 행 체크박스를 클릭하면 해당 행을 선택/선택 해제
            $(document).on('click', '.rowCheckbox', function(){
                var id = parseInt($(this).attr('name'));
                if ($(this).prop('checked')) {
                    selectedRows.push(id);
                } else {
                    var index = selectedRows.indexOf(id);
                    if (index > -1) {
                        selectedRows.splice(index, 1);
                    }
                }

                // 모든 행이 선택되었으면 "모두 선택" 체크박스를 체크, 그렇지 않으면 체크 해제
                if ($('.rowCheckbox:checked').length == $('.rowCheckbox').length) {
                    $('#selectAllCheckboxPhotos').prop('checked', true);
                } else {
                    $('#selectAllCheckboxPhotos').prop('checked', false);
                }
                updateSelectedCount();
            });
        }

        bindCheckboxEvents(); // 초기 로드 시 이벤트 바인딩

        // 섹션1 사진 등록 폼 제출 시 username 값 추가
        $('#section1PhotoUploadForm').submit(function(event) {
            event.preventDefault(); // 기본 동작 방지

            // username 값을 폼 데이터에 추가
            var formData = new FormData(this);
            formData.append('username', username);

            // AJAX 요청으로 폼 데이터 전송
            $.ajax({
                url: $(this).attr('action'),
                method: $(this).attr('method'),
                data: formData,
                processData: false,
                contentType: false,
                success: function(response) {
                    alert('사진이 성공적으로 업로드되었습니다.');
                    // 섹션1 사진 목록 갱신
                    loadSection1Photos();
                    // 섹션1 사진 등록 폼 숨기기
                    $('#section1PhotoForm').hide();
                    // 섹션1 사진 목록 표시
                    $('#section1PhotoList').show();
                },
                error: function(error) {
                    alert('사진 업로드에 실패하였습니다.');
                }
            });
        });
    });
</script>

</body>
</html>
