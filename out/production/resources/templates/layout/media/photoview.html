<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>photo</title>
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/media/photoview.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="newsWrapper newsContainer">
    <div class="mediaRoomContainer">
        <div class="mediaRoomContents">
            <div class="photoInformation">
                <div class="titleBox"><p th:text="${clubPhoto.cpTitle}"></p>
                    <div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-user"></i>
                            <p>작성자</p>
                            <p th:text="${clubPhoto.username}"></p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-calendar"></i>
                            <p>작성일</p>
                            <p th:text="${clubPhoto.cpRegdate}"></p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-eye"></i>
                            <p>조회수</p>
                            <p th:text="${clubPhoto.cpHits}"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cpContent">
                <div class="content">
                    <p th:utext="${clubPhoto.cpContent}"></p>
                </div>
                <div class="previous-post post-navigation" th:if="${prevClubPhoto != null}">
                    <div><p>이전글</p>
                        <div class="arrow up"></div>
                        <a class="title" th:href="@{/media/photoview(no=${prevClubPhoto.cpIdx})}"
                           th:text="${prevClubPhoto.cpTitle}">이전글 제목</a>
                    </div>
                </div>
                <div class="formBtns">
                    <a id="default_butt" href="/media/photo" class="btn btn-default">목록</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <th:block th:include="layout/footer"></th:block>
</footer>
</body>
</html>
