<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/common/header :: load('k5 매치 관리 페이지')"></head>
<body>
<!-- 프리로더 -->
<div th:replace="layout/common/preloader :: load()"></div>

<!-- 네비게이션바 -->
<nav th:replace="layout/common/navigator :: load()"></nav>

<!-- 메인 사이드바 컨테이너 -->
<aside th:replace="layout/common/sider :: load()"></aside>

<!-- 컨텐츠 래퍼 -->
<div id="app" class="content-wrapper">
    <!-- 페이지 헤더 -->
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0">k5 매치 관리 페이지</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/admin/layout/adminpage">홈</a></li>
                        <li class="breadcrumb-item active">k5 매치 관리 페이지</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <!-- 매치 추가 및 수정 양식 -->
    <section class="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">새 매치 추가</h3>
                <button type="button" class="btn btn-primary float-right" id="addMatchButton" onclick="toggleAddMatchForm()">경기 등록</button>
            </div>
            <div class="card-body" id="addMatchSection" style="display: none; max-width: 700px; margin: 0 auto;">
                <form id="addMatchForm" class="form-row">
                    <div class="form-group col-md-6">
                        <label>상대 팀 이름:</label>
                        <input type="text" class="form-control" name="teamName">
                    </div>
                    <div class="form-group col-md-6">
                        <label>점수:</label>
                        <div class="form-inline" style="align-items: center;">
                            <select class="form-control" name="ourTeamScore" style="width: 80px;">
                                ${[...Array(11).keys()].map(num => `<option>${num}</option>`).join('')}
                            </select>
                            <span class="mx-2 font-weight-bold">VS</span>
                            <select class="form-control" name="opponentTeamScore" style="width: 80px;">
                                ${[...Array(11).keys()].map(num => `<option>${num}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="form-group col-md-6">
                        <label>날짜:</label>
                        <input type="date" class="form-control" name="matchDate">
                    </div>
                    <div class="form-group col-md-6">
                        <label>시간:</label>
                        <input type="time" class="form-control" name="matchTime">
                    </div>
                    <div class="form-group col-md-6">
                        <label>장소:</label>
                        <input type="text" class="form-control" name="matchLocation">
                    </div>
                    <div class="form-group col-md-6">
                        <label>상태:</label>
                        <select class="form-control" name="matchStatus">
                            <option>예정</option>
                            <option>진행중</option>
                            <option>완료</option>
                        </select>
                    </div>
                    <div class="form-group col-md-6">
                        <label>홈/어웨이:</label>
                        <select class="form-control" name="matchHome">
                            <option>홈</option>
                            <option>어웨이</option>
                        </select>
                    </div>
                    <div class="form-group col-md-12 text-center">
                        <button type="button" class="btn btn-success" id="addMatchSubmitButton" onclick="addMatch()" style="margin-top: 10px;">추가</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- 메인 콘텐츠: 매치 목록 -->
    <section class="content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">매치 목록</h3>
            </div>
            <div class="card-body">
                <table class="table table-bordered" id="matchList">
                    <thead>
                    <tr>
                        <th>팀 이름</th>
                        <th>점수</th>
                        <th>날짜</th>
                        <th>시간</th>
                        <th>장소</th>
                        <th>상태</th>
                        <th>홈/어웨이</th>
                        <th>리그</th>
                        <th>작업</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- 동적으로 로드된 매치 데이터 -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<!-- 푸터 -->
<footer th:replace="layout/common/footer :: load()"></footer>

<!-- 공통 자바스크립트 -->
<div th:include="layout/common/script :: load()"></div>

<script th:inline="javascript">
    // 숫자 드롭다운 메뉴 생성
    function generateScoreOptions() {
        let options = "";
        for (let i = 0; i <= 10; i++) {
            options += `<option value="${i}">${i}</option>`;
        }
        return options;
    }

    // JWT 토큰을 디코딩하는 함수
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        return JSON.parse(jsonPayload);
    }

    // JWT 토큰이 저장된 곳에서 가져오기
    var token = localStorage.getItem('accessToken');

    // 토큰에서 사용자 이름 추출
    var username = parseJwt(token).sub;

    // 사용자 이름이 정상적으로 추출되었는지 콘솔에 로깅
    console.log("Username: ", username);

    // HTML 페이지에 사용자 이름 노출
    document.querySelector('.d-block').textContent = username + " 관리자";

    function toggleAddMatchForm() {
        var formSection = document.getElementById('addMatchSection');
        var addMatchButton = document.getElementById('addMatchButton');

        if (formSection.style.display === 'none') {
            addMatchButton.textContent = "취소";
            formSection.style.display = 'block';
        } else {
            addMatchButton.textContent = "경기 등록";
            formSection.style.display = 'none';
        }
    }


    var editingRow = null;

    function editMatch(button) {
        var row = button.parentNode.parentNode;
        editingRow = row;
        var cells = row.querySelectorAll('td:not(:last-child)');
        var form = document.getElementById('addMatchForm');
        form.teamName.value = cells[0].innerText.split(' vs ')[1] || '';
        var scores = cells[1].innerText.split(' vs ');
        form.ourTeamScore.value = scores[0] || '0';
        form.opponentTeamScore.value = scores[1] || '0';
        form.matchDate.value = cells[2].innerText || '';
        form.matchTime.value = cells[3].innerText || '';
        form.matchLocation.value = cells[4].innerText || '';
        form.matchStatus.value = cells[5].innerText || '예정';
        form.matchHome.value = cells[6].innerText || '홈';

        document.getElementById('addMatchSubmitButton').innerText = "수정완료";
        document.getElementById('addMatchSubmitButton').classList.remove("btn-success");
        document.getElementById('addMatchSubmitButton').classList.add("btn-warning");
        document.getElementById('addMatchSubmitButton').setAttribute("onclick", "updateMatch()");
        document.getElementById('addMatchSection').style.display = "block"; // 폼을 항상 표시
    }

    function addMatch() {
        var form = document.getElementById('addMatchForm');
        var ourTeamName = "우리팀"; // 고정된 우리 팀 이름
        var leagueGb = "k5"; // 고정된 리그 값
        var newMatch = {
            teamName: ourTeamName + " vs " + form.teamName.value,
            matchScore: form.ourTeamScore.value + " vs " + form.opponentTeamScore.value,
            matchDate: form.matchDate.value,
            matchTime: form.matchTime.value,
            matchLocation: form.matchLocation.value,
            matchStatus: form.matchStatus.value,
            matchHome: form.matchHome.value,
            leagueGb: leagueGb
        };

        var tbody = document.getElementById('matchList').querySelector('tbody');
        var newRow = tbody.insertRow();
        Object.values(newMatch).forEach((value, index) => {
            var cell = newRow.insertCell();
            cell.innerText = value;
        });
        var actionCell = newRow.insertCell();
        actionCell.innerHTML = '<button class="btn btn-danger btn-sm" onclick="deleteMatch(this)">삭제</button> <button class="btn btn-warning btn-sm" onclick="editMatch(this)">수정</button>';

        form.reset();
    }

    function updateMatch() {
        var form = document.getElementById('addMatchForm');
        var ourTeamName = "우리팀"; // 고정된 우리 팀 이름
        var leagueGb = "k5"; // 고정된 리그 값
        var updatedMatch = {
            teamName: ourTeamName + " vs " + form.teamName.value,
            matchScore: form.ourTeamScore.value + " vs " + form.opponentTeamScore.value,
            matchDate: form.matchDate.value,
            matchTime: form.matchTime.value,
            matchLocation: form.matchLocation.value,
            matchStatus: form.matchStatus.value,
            matchHome: form.matchHome.value,
            leagueGb: leagueGb
        };

        var cells = editingRow.querySelectorAll('td:not(:last-child)');
        Object.values(updatedMatch).forEach((value, index) => {
            cells[index].innerText = value;
        });

        form.reset();
        editingRow = null;
        document.getElementById('addMatchSubmitButton').innerText = "추가";
        document.getElementById('addMatchSubmitButton').classList.remove("btn-warning");
        document.getElementById('addMatchSubmitButton').classList.add("btn-success");
        document.getElementById('addMatchSubmitButton').setAttribute("onclick", "addMatch()");
    }

    function deleteMatch(button) {
        var row = button.parentNode.parentNode;
        row.remove();
    }

    // 드롭다운 스코어 생성
    document.querySelector('[name="ourTeamScore"]').innerHTML = generateScoreOptions();
    document.querySelector('[name="opponentTeamScore"]').innerHTML = generateScoreOptions();
</script>

</body>
</html>
