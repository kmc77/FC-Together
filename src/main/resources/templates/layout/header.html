<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Team Staff Detail</title>
    <style>
        .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    height: 80px;
}

.utils {
    display: flex;
    align-items: center;
}

.utils a {
    margin-left: 10px;
}

.logo {
    margin-right: auto;
    margin-left: 20px;
}

.logo img {
    height: 100%;
    width: auto;
}

#logoImg {
    width: 100px;
    height: 100px;
}

.gnbBox {
    clear: both;
}

.mainMenuBox {
    list-style: none;
    display: flex;
    align-items: center !important;
    margin: auto !important;
    justify-content: center !important;
    align-self: stretch !important;
    margin-left: 60px;
}

.mainMenu {
    margin-right: 120px;
}

    </style>
</head>
<body>
<div class="top">
    <div class="logo">
        <a th:href="@{/}" class="router-link-exact-active router-link-active" aria-current="page">
            <img th:src="@{img/FcTogether.jpg}" alt="" id="logoImg">
        </a>
    </div>

    <div class="utils">
        <a href="/member/signin" class="link">로그인</a>
        <a href="/member/JoinForm" class="link">회원가입</a>
    </div>
</div>

<div class="gnbBox">
    <div class="container">
        <ul class="mainMenuBox">
            <li class="mainMenu">CLUB</li>
            <li class="mainMenu">TEAM</li>
            <li class="mainMenu ">MATCH</li>
            <li class="mainMenu">HISTORY</li>
            <li class="mainMenu">RECORD</li>
            <li class="mainMenu">MEDIA</li>
            <li class="mainMenu">SERVICE</li>
        </ul>
    </div>
</div>
</body>
</html>
