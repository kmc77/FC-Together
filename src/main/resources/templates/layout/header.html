<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LoginForm</title>
    <link href="/css/layout/header.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="top">
    <div class="logo">
        <a href="/">
            <img src="/img/FcTogether.jpg" alt="" id="logoImg">
        </a>
    </div>
    <div class="utils">
        <!-- 세션에서 userId 값을 가져와서 로그인 상태인지 확인 -->
        <span th:if="${session.userId}" th:text="${session.userId}" class="account-info"></span>
        <a th:if="${session.userId}" href="/user/logout" class="link" onclick="logout()">로그아웃</a>
        <a th:unless="${session.userId}" href="/user/LoginForm" class="link">로그인</a>
        <a th:unless="${session.userId}" href="/user/JoinForm" class="link">회원가입</a>
    </div>
</div>
<script>
    function logout() {
        location.href = "/member/logout"; // 로그아웃 요청
        alert("로그아웃 되었습니다."); // 얼럿 메시지 노출
    }
</script>

<div class="gnbBox">
    <div class="container">
        <ul class="mainMenuBox">
            <li class="mainMenu">CLUB</li>
            <li class="mainMenu">TEAM</li>
            <li class="mainMenu">MATCH</li>
            <li class="mainMenu">HISTORY</li>
            <li class="mainMenu">RECORD</li>
            <li class="mainMenu">MEDIA</li>
            <li class="mainMenu">SERVICE</li>
        </ul>
    </div>
</div>
</body>
</html>
