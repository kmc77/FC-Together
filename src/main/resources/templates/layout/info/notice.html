<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>notice</title>
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/info/notice.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="container">
    <div class="noticePage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>공지사항</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="/media/all" class="tabLink">
                        <span>전체</span>
                    </a>
                    <a href="/media/notice" class="tabLink router-link-exact-active router-link-active current"
                       aria-current="page">
                        <span>공지사항</span>
                    </a>
                    <a href="/media/news" class="tabLink">
                        <span>구단소식</span>
                    </a>
                    <a href="/media/photo" class="tabLink">
                        <span>경기사진</span>
                    </a>
                    <a href="/media/video" class="tabLink">
                        <span>구단영상</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="layout-inner">
            <section class="notice-wrap">
                <div class="list-basic">
                   <!-- <div class="list-item">
                        <div class="col tit">
                            <a href="/media/notice/view?no=" class="notice-tit">noticeTitle 값</a>
                        </div>
                        <div class="col">
                            <span class="txt-num">noticeDate 값</span>
                            <span class="txt-hit">noticeHits 값</span>
                        </div>
                    </div>-->
                </div>
            </section>
        </div>
    </div>

</div>
<script>
    $(document).ready(function(){

    // 최초 입장 시 노티스 탭이 선택되어 노티스 목록을 조회
        loadNoticeList();

        var activeTab = $(".tabLink.router-link-exact-active.router-link-active.current")[0]; // 페이지 로드 시 활성화된 탭을 저장합니다.

        $("body").on("click", ".tabLink", function(e){
            // 같은 탭이 연속으로 클릭된 경우 요청을 중단합니다.
            if(this === activeTab) {
                return;
            }

            e.preventDefault();
            var tabUrl = $(this).attr("href"); // 클릭한 탭의 URL을 가져옵니다.

            // 클릭한 탭을 현재 활성화된 탭으로 설정합니다.
            activeTab = this;

            // 모든 탭에서 'router-link-exact-active', 'router-link-active', 'current' 클래스를 제거합니다.
            $(".tabLink").removeClass("router-link-exact-active router-link-active current");
            // 클릭한 탭에 'router-link-exact-active', 'router-link-active', 'current' 클래스를 추가합니다.
            $(this).addClass("router-link-exact-active router-link-active current");

            // 페이지의 일부만 동적으로 변경합니다.
            $.ajax({
                url: tabUrl,
                type: 'get',
                success: function(response) {
                    // 페이지 내용을 동적으로 변경합니다.
                    $("#content").html(response);

                    // 브라우저의 히스토리 항목을 변경하여 URL을 업데이트합니다.
                    history.pushState({}, null, tabUrl);
                }
            });
        });

    // 노티스 목록을 조회하는 함수
        function loadNoticeList() {
            $.ajax({
                url: "/media/notice/list",
                type: "get",
                success: function(response) {
                    var listHtml = ''; // HTML 문자열을 저장할 변수

                    // 각 노티스 항목에 대해 HTML 문자열을 생성합니다.
                    response.forEach(function(notice) {
                        listHtml += '<div class="list-item">'
                                + '    <div class="col tit">'
                                + '        <a href="/media/notice/view?no=' + notice.noticeNum + '" class="notice-tit">' + notice.noticeTitle + '</a>'
                                + '    </div>'
                                + '    <div class="col">'
                                + '        <span class="txt-num">' + notice.noticeDate + '</span>'
                                + '        <span class="txt-hit">' + notice.noticeHits + '</span>'
                                + '    </div>'
                                + '</div>';
                    });

                    // 생성한 HTML 문자열을 페이지에 추가합니다.
                    $(".list-basic").html(listHtml);
                },
                error: function(xhr, status, error) {
                    // 에러 처리 로직 작성
                    console.error('노티스 목록 조회 에러:', error);
                }
            });
        }
    });
</script>


</body>
</html>
