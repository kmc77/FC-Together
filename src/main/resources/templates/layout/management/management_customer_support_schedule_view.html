<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${trainingSchedule.scheduleTitle}">Title</title>
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/management/management_customer_support_schedule_view.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="newsWrapper newsContainer">
    <div class="mediaRoomContainer">
        <div class="mediaRoomContents">
            <div class="tsInformation">
                <div class="titleBox">
                    <!-- 제목, 작성자, 작성일, 조회수 -->
                    <p th:text="${trainingSchedule.scheduleTitle}">제목</p>
                    <div>
                        <div class="titleInfo">
                            <p>작성자</p>
                            <p th:text="${trainingSchedule.username}">Username</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <p>작성일</p>
                            <p th:text="${trainingSchedule.scheduleDate}">Date</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <p>조회수</p>
                            <p th:text="${trainingSchedule.scheduleHits}">Hits</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tsContent">
                <!-- 글 내용 -->
                <div class="content">
                    <p th:utext="${trainingSchedule.scheduleContent}">Content</p>
                </div>


                <!-- 이전 글 링크 -->
                <div class="previous-post post-navigation" th:if="${prevSchedule != null}">
                    <div>
                        <p>이전글</p>
                        <div class="arrow up"></div>
                        <a th:href="@{/management/management_customer_support_schedule_view(no=${prevSchedule.scheduleNum})}" th:text="${prevSchedule.scheduleTitle}">Previous Schedule Title</a>
                    </div>
                </div>

                <!-- 목록으로 돌아가기 버튼 -->
                <div class="formBtns">
                    <a id="default_butt" href="/management/management_customer_support#tab4" class="btn btn-default">목록</a>
                </div>
            </div>
        </div>
    </div>
</div>
<footer>
    <th:block th:include="layout/footer"></th:block>
</footer>
</body>
</html>
