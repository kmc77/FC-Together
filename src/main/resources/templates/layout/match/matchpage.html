<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>경기 일정 / 결과</title>
    <th:block th:include="layout/header"></th:block>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link href="/css/layout/team/teampage.css" rel="stylesheet"/>
    <link href="/css/layout/match/matchpage.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>

<div class="teamPage" id="content">
    <div class="subTop">
        <div class="top">
            <div class="container">
                <div class="topTitle">
                    <p class="title">
                        <span class="mobileBreak"><strong></strong>경기 일정 / 결과</span>
                    </p>
                </div>
            </div>
        </div>
        <!-- 메인 탭 메뉴 -->
        <div class="tabMenu">
            <div class="container">
                <ul class="tab-bar">
                    <li data-num="1" class="tab wave dark main-tab"><a href="#">K5 선수단</a></li>
                    <li data-num="2" class="tab wave dark main-tab"><a href="#">K7 선수단</a></li>
                    <li data-num="3" class="tab wave dark main-tab"><a href="#">W리그 선수단</a></li>
                    <div class="indicator"></div>
                </ul>
            </div>
        </div>
        <!-- 서브 탭 메뉴 -->
        <div class="sub_tabMenu">
            <div class="sub_container">
                <ul class="sub-tab-bar">
                    <li data-num="1" class="sub-tab wave dark sub-tab"><a href="#">경기 일정</a></li>
                    <li data-num="4" class="sub-tab wave dark sub-tab"><a href="#">경기 결과</a></li>
                    <div class="sub-indicator"></div>
                </ul>
            </div>
        </div>

        <div class="tab__content" id="scheduleContent">
            <!-- 경기 일정 -->
            <div class="team-member section">
                <div th:each="match : ${K5Resultlist}" id="Schedulelist">
                    <div th:text="${match.teamStaffName}" class="matches"></div>
                    <div th:text="${match.matchResult}" class="matches"></div>
                    <div th:text="${match.matchScore}" class="matches"></div>
                    <div th:text="${match.matchDate}" class="matches"></div>
                    <div th:text="${match.matchTime}" class="matches"></div>
                    <div th:text="${match.matchLocation}" class="matches"></div>
                    <div th:text="${match.matchHome}" class="matches"></div>
                </div>
            </div>
            <div id="loadMore"></div>

        </div>

        <div class="tab__content" id="resultContent">
            <!-- 경기 결과 -->
            <div class="team-member section">
                <div th:each="match : ${K5Schedulelist}" id="Resultlist">
                    <div th:text="${match.teamStaffName}" class="matches"></div>
                    <div th:text="${match.matchResult}" class="matches"></div>
                    <div th:text="${match.matchScore}" class="matches"></div>
                    <div th:text="${match.matchDate}" class="matches"></div>
                    <div th:text="${match.matchTime}" class="matches"></div>
                    <div th:text="${match.matchLocation}" class="matches"></div>
                    <div th:text="${match.matchHome}" class="matches"></div>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
    var waveBtnInit = function () {
            // 메인 탭과 서브 탭을 모두 선택
            var mainTabs = document.querySelectorAll('.main-tab.wave');
            var subTabs = document.querySelectorAll('.sub-tab.wave');
            var mainIndicator = document.querySelector('.tab-bar .indicator');
            var subIndicator = document.querySelector('.sub-tab-bar .sub-indicator');

            // 인디케이터 위치 업데이트 함수
            function updateIndicator(indicator, index, tabType, tabs) {
                // 탭의 전체 길이와 간격 계산
                var totalWidth = tabs.length * tabs[0].offsetWidth; // 탭의 개수 * 탭 하나의 너비
                var tabWidth = tabs[0].offsetWidth; // 탭 하나의 너비
                var offset = (totalWidth - tabWidth) / (tabs.length - 1); // 간격 계산
                var marginLeft = index * offset; // 인디케이터의 왼쪽 여백 계산

                // 인디케이터 위치 및 크기 업데이트
                indicator.style.width = tabWidth + 'px'; // 인디케이터 너비 업데이트
                indicator.style.marginLeft = marginLeft + 'px'; // 인디케이터 왼쪽 여백 업데이트
            }

            // 탭 클릭 이벤트 핸들러
            function addWaveEffect(tabs, indicator, tabType) {
                tabs.forEach(function(tab, index) {
                    tab.addEventListener('click', function(e) {
                        var newRound = document.createElement('div');
                        var x = e.pageX - tab.offsetLeft;
                        var y = e.pageY - tab.offsetTop;

                        newRound.className = 'cercle anim';
                        newRound.style.left = x + "px";
                        newRound.style.top = y + "px";
                        tab.appendChild(newRound);

                        // 인디케이터 위치 업데이트
                        updateIndicator(indicator, index, tabType, tabs);

                        // 애니메이션이 완료된 후 newRound 요소 제거
                        setTimeout(function() {
                            newRound.remove();
                        }, 1200);
                    });
                });
            }

            // 첫 번째 탭에 대한 인디케이터 위치 초기화
            if (mainTabs.length > 0) updateIndicator(mainIndicator, 0, 'main', mainTabs);
            if (subTabs.length > 0) updateIndicator(subIndicator, 0, 'sub', subTabs);

            // 메인 탭과 서브 탭에 대한 이벤트 리스너 추가
            addWaveEffect(mainTabs, mainIndicator, 'main');
            addWaveEffect(subTabs, subIndicator, 'sub');
        };

        // 페이지 로드 시 함수 실행
        waveBtnInit();

    window.addEventListener('DOMContentLoaded', (event) => {
// K5 선수단 탭의 경기 일정 탭을 선택
var k5ScheduleTab = document.querySelector('.main-tab[data-num="1"]');
var scheduleTab = document.querySelector('.sub-tab[data-num="1"]');

// 클릭 이벤트를 생성하고 실행
var clickEvent = new MouseEvent('click', {
    bubbles: true,
    cancelable: true,
    view: window
});
k5ScheduleTab.dispatchEvent(clickEvent);
scheduleTab.dispatchEvent(clickEvent);
});

// 메인 탭 및 서브 탭 클릭 이벤트 설정
document.addEventListener('DOMContentLoaded', function() {
    var mainTabs = document.querySelectorAll('.main-tab');
    var subTabs = document.querySelectorAll('.sub-tab');

    mainTabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            var tabNum = this.getAttribute('data-num');
            showTabContent(tabNum);
        });
    });

    subTabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            var tabNum = this.getAttribute('data-num');
            showTabContent(tabNum);
        });
    });

    // 초기 설정: 경기 일정 탭 표시
    showTabContent(1);
});

// 탭 내용 표시 함수
function showTabContent(tabNum) {
    var scheduleContent = document.getElementById('scheduleContent');
    var resultContent = document.getElementById('resultContent');

    if (tabNum === '1') {
        scheduleContent.style.display = 'block';
        resultContent.style.display = 'none';
    } else if (tabNum === '4') {
        scheduleContent.style.display = 'none';
        resultContent.style.display = 'block';
    }
}

    window.addEventListener('DOMContentLoaded', function() {
    var scheduleList = document.getElementById('scheduleList');
    var loadMore = document.getElementById('loadMore');
    var batchSize = 5; // 한 번에 로드할 아이템 수
    var totalItems = scheduleData.length; // 전체 아이템 수
    var visibleItems = 5; // 처음에 보일 아이템 수
    var lastLoadedIndex = visibleItems; // 초기로드된 아이템 수를 마지막으로 로드된 아이템 인덱스로 설정

    function loadMoreItems() {
        for (var i = lastLoadedIndex; i < lastLoadedIndex + batchSize; i++) {
            if (i >= totalItems) return; // 모든 아이템이 로드되면 종료
            var match = scheduleData[i];
            var matchElement = createMatchElement(match); // 매치 아이템 생성
            scheduleList.appendChild(matchElement); // 생성한 아이템 추가
        }
        lastLoadedIndex += batchSize; // 마지막으로 로드된 아이템 인덱스 업데이트
    }

    // 초기로드된 아이템들을 표시
    for (var i = 0; i < visibleItems; i++) {
        var match = scheduleData[i];
        var matchElement = createMatchElement(match); // 매치 아이템 생성
        scheduleList.appendChild(matchElement); // 생성한 아이템 추가
    }

    // 스크롤 이벤트 리스너 추가하여 사용자가 페이지 하단에 도달하면 추가 아이템을 로드
    window.addEventListener('scroll', function() {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight) {
            loadMoreItems();
        }
    });
});


</script>

</body>
</html>
