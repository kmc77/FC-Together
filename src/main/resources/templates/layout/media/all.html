<!DOCTYPE html>
<html lang="">
<head>
    <!-- <meta charset="UTF-8">
     <title>notice</title>
     <th:block th:include="layout/header"></th:block>-->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="container">
    <div class="noticePage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>전체</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="/media/all" class="tabLink router-link-exact-active router-link-active current">
                        <span>전체</span>
                    </a>
                    <a href="/media/notice"
                       aria-current="page">
                        <span>공지사항</span>
                    </a>
                    <a href="/media/news" class="tabLink">
                        <span>구단소식</span>
                    </a>
                    <a href="/media/photo" class="tabLink">
                        <span>구단사진</span>
                    </a>
                    <a href="/media/video" class="tabLink">
                        <span>영상</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="list-contents">
            <div class="media-container">
                <div class="media-board">
                    <div class="media-item-container">
                        <!-- 컨텐츠 노출 영역 -->
                    </div>
                </div>
                <div class="formBtns">
                    <button id="loadMore" class="btn btn-more">More</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        var limit = 10; // 한 번에 노티스 목록을 조회할 개수
        var start = 0; // 조회 시작 위치

        // 최초 입장 시 노티스 탭이 선택되어 노티스 목록을 조회
        loadNoticeList(start, limit);

        // 더보기 버튼 클릭 시 추가적으로 공지사항 목록 조회
        $("#loadMore").click(function() {
            start += limit;
            loadNoticeList(start, limit);
        });

        var activeTab = $(".tabLink.router-link-exact-active.router-link-active.current")[0]; // 페이지 로드 시 활성화된 탭을 저장합니다.

        function loadNoticeList(start, limit) {
            $.ajax({
                url: '/media/all/list',
                type: 'GET',
                data: {},
                dataType: 'json',
                success: function(response) {
                    if (isEmptyData(response)) {
                        alert('더 이상 표시할 글이 없습니다.');
                        return;
                    }

                    processMediaItems(response.photos, '사진');
                    processMediaItems(response.news, '뉴스');
                    processMediaItems(response.notices, '공지사항', true); // 공지사항은 기본 이미지만 사용
                    processMediaItems(response.videos, '비디오');
                },
                error: function(error) {
                    console.error('정보를 가져오는데 실패했습니다.', error);
                    alert('정보를 가져오는 데 문제가 발생했습니다. 잠시 후 다시 시도해주세요.');
                }
            });
        }

        function isEmptyData(response) {
            return response.photos.length === 0 && response.news.length === 0 && response.notices.length === 0 && (!response.videos || response.videos.length === 0);
        }

        function processMediaItems(items, type, isNotice = false) {
            $.each(items, function(index, item) {
                var imgSrc = item.imageUrl ? item.imageUrl : '/img/FcTogether.jpg';
                if (isNotice) imgSrc = '/img/FcTogether.jpg'; // 공지사항은 기본 이미지로 고정
                createMediaItem(item.title, item.date, item.hits, imgSrc, type);
            });
        }

        function createMediaItem(title, date, hits, imgSrc, category) {
            var mediaItem = '<a href="/media/allView?no=' + title + '">' +
                '<div class="media-detail">' +
                '<div class="media-thumbnail" style="background-image: url(\'' + imgSrc + '\');"></div>' +
                '<div class="media-contents">' +
                '<div class="media-title">' +
                '<p class="media-title">' + title + '</p>' +
                '</div>' +
                '<div class="media-date-and-hits">' +
                '<p>' + date + ' • ' + hits + '</p>' +
                '</div>' +
                '<div class="media-category">' +
                '<p>' + category + '</p>' +
                '</div>' +
                '</div>' +
                '</div>' +
                '</a>';

            $('.media-item-container').append(mediaItem);
        }
    });
</script>



</body>
</html>
