<!DOCTYPE html>
<html lang="" class="memberPage" xmlns:th="http://www.thymeleaf.org">
<head>
     <meta charset="UTF-8">
     <title>news</title>
   <!-- <th:block th:include="layout/header"></th:block>-->
    <link href="/css/layout/media/news.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="container">
    <div class="newsPage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>구단소식</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="/media/all" class="tabLink">
                        <span>전체</span>
                    </a>
                    <a href="/media/notice" aria-current="page">
                        <span>공지사항</span>
                    </a>
                    <a href="/media/news" class="tabLink router-link-exact-active router-link-active current">
                        <span>구단소식</span>
                    </a>
                    <a href="/media/photo" class="tabLink">
                        <span>구단사진</span>
                    </a>
                    <a href="/media/video" class="tabLink">
                        <span>영상</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="list-contents">
            <div class="news-container">
                <div class="news-board">
                    <div class="news-item-container">
                        <!--
                        <div class="news-detail">
                            <div class="news-thumbnail" style="background-image: url('https://static.mims.kr/upload/suG3cOmTNpBUkM72CCXX20230925014050817314.jpg');"></div>
                            <div class="news-contents">
                                <div class="news-title">
                                    <p id="news-title"></p> &lt;!&ndash; 수정: id 값을 추가했습니다. &ndash;&gt;
                                </div>
                                <div class="news-date" id="news-date"> &lt;!&ndash; 수정: id 값을 추가했습니다. &ndash;&gt;
                                </div>
                            </div>
                        </div>
                        -->
                    </div>
                </div>
                <div class="formBtns">
                    <button id="loadMore" class="btn btn-more">More</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        var limit = 9; // 한 번에 뉴스 목록을 조회할 개수
        var start = 0; // 조회 시작 위치
        var activeTabHref = $(".tabLink.router-link-exact-active.router-link-active.current").attr("href"); // 현재 활성화된 탭의 href

        loadNewsList(start, limit); // 초기 뉴스 목록 로딩

        $("#loadMore").click(function() {
            start += limit;
            loadNewsList(start, limit); // "더 보기" 버튼 클릭 시 추가 뉴스 목록 조회
        });

        $("body").on("click", ".tabLink", function(e) {
            var clickedTabHref = $(this).attr("href");

            // 클릭된 탭이 현재 활성화된 탭과 같은 경우 기본 동작 방지
            if (activeTabHref === clickedTabHref) {
                e.preventDefault();
                return; // 추가 동작 수행 방지
            }

            e.preventDefault();
            activeTabHref = clickedTabHref; // 클릭된 탭의 href를 새로운 활성화된 탭으로 업데이트

            // AJAX 요청으로 페이지의 일부만 변경
            $.ajax({
                url: clickedTabHref,
                type: 'get',
                success: function(response) {
                    $("#content").html(response);
                    history.pushState({}, null, clickedTabHref);
                    // 필요한 초기화 작업 수행
                    start = 0; // 목록 로딩 시작 위치를 초기화
                    loadNewsList(start, limit); // 새 탭에 맞는 데이터 로드
                }
            });
        });

        // 뉴스 목록을 조회하는 함수
        function loadNewsList(start, limit) {
            $.ajax({
                url: '/media/news/list',
                type: 'GET',
                data: {
                    start: start,
                    limit: limit
                },
                dataType: 'json',
                success: function(newsList) {
                    if (newsList.length === 0) {
                        alert('더 이상 표시할 뉴스가 없습니다.');
                        return;
                    }

                    // 뉴스 목록 추가 로직
                    if(start === 0) $('.news-item-container').empty(); // 새 탭에서는 목록을 초기화

                    $.each(newsList, function(index, news) {
                        var newsItem = createNewsItem(news); // 뉴스 아이템 생성 함수
                        $('.news-item-container').append(newsItem);
                    });
                },
                error: function(error) {
                    console.error('뉴스를 가져오는데 실패했습니다.', error);
                }
            });
        }

        // 뉴스 아이템 생성 함수
       function createNewsItem(news) {
            var srcRegex = /<img[^>]+src="([^">]+)"/;
            var match = news.newsContent.match(srcRegex);
            var imgSrc = match ? match[1] : '/img/FcTogether.jpg'; // 기본 이미지 사용

            var newsItem = '<a href="/media/newsview?no=' + news.newsIdx + '">' +
                '<div class="news-detail">' +
                    '<div class="news-thumbnail" style="background-image: url(\'' + imgSrc + '\');"></div>' +
                    '<div class="news-contents">' +
                        '<div class="news-title">' + news.newsTitle + '</div>' +
                        '<div class="news-date-and-hits">' + news.newsRegdate + ' • ' + news.newsHits + '</div>' +
                        // 여기에 새로운 영역을 추가합니다.
                        '<div class="news-table">' +
                            '<p>' + news.tableGb + '</p>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</a>';

            return newsItem;
        }
    });
</script>
</body>
</html>
