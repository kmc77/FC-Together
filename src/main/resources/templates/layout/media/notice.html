<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공지사항</title>
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/media/notice.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="notice-container">
    <div class="noticePage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>공지사항</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="/media/all" class="tabLink">
                        <span>전체</span>
                    </a>
                    <a href="/media/notice" class="tabLink router-link-exact-active router-link-active current"
                       aria-current="page">
                        <span>공지사항</span>
                    </a>
                    <a href="/media/news" class="tabLink">
                        <span>구단소식</span>
                    </a>
                    <a href="/media/photo" class="tabLink">
                        <span>구단사진</span>
                    </a>
                    <a href="/media/video" class="tabLink">
                        <span>영상</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="layout-inner">
            <section class="notice-wrap">
                <div class="list-basic">
                    <!-- 공지사항 목록 -->
                </div>
                <div class="formBtns">
                    <button id="loadMore" class="btn btn-more">더보기</button>
                </div>
            </section>
        </div>
    </div>
</div>
<script>
    $(document).ready(function() {
        var limit = 8; // 한 번에 조회할 공지사항의 개수
        var start = 0; // 조회 시작 위치
        var activeTabHref = $(".tabLink.router-link-exact-active.router-link-active.current").attr("href");

        $("#loadMore").click(function() {
            start += limit;
            loadNoticeList(start, limit);
        });

        $("body").on("click", ".tabLink", function(e) {
            var clickedTabHref = $(this).attr("href");
            if (activeTabHref !== clickedTabHref) {
                window.location.href = clickedTabHref; // 클릭된 탭의 링크로 페이지 이동
                return; // 이 함수의 추가 실행을 방지
            }

            // 이미 활성화된 탭을 다시 클릭한 경우 기본 동작 방지
            e.preventDefault();
        });

        function loadNoticeList(start, limit) {
            $.ajax({
                url: "/media/notice/list",
                type: "get",
                data: {
                    start: start,
                    limit: limit
                },
                success: function(response) {
                    if (response.length === 0) {
                        alert('더 이상 표시할 공지사항이 없습니다.');
                        return;
                    }

                    var listHtml = '';
                    response.forEach(function(notice) {
                        listHtml += '<div class="list-item">' +
                            '<div class="col tit">' +
                            '<a href="/media/noticeview?no=' + notice.noticeNum + '" class="notice-tit">' + notice.noticeTitle + '</a>' +
                            '</div>' +
                            '<div class="col">' +
                            '<span class="txt-num">' + notice.noticeDate + '</span>' +
                            '<span class="txt-hit dot">' + notice.noticeHits + '</span>' +
                            '</div>' +
                            '</div>';
                    });

                    $(".list-basic").append(listHtml);
                },
                error: function(xhr, status, error) {
                    console.error('공지사항 목록 조회 에러:', error);
                }
            });
        }

        // 초기 목록 로딩
        loadNoticeList(start, limit);
    });
</script>
<footer>
    <th:block th:include="layout/footer"></th:block>
</footer>
</body>
</html>
