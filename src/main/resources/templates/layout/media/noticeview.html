<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${notice.noticeTitle}">Title</title>
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/media/noticeview.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="noticeWrapper noticeContainer">
    <div class="mediaRoomContainer">
        <div class="mediaRoomContents">
            <div class="noticeInformation">
                <div class="titleBox">
                    <!-- 제목, 작성자, 작성일, 조회수 -->
                    <p th:text="${notice.noticeTitle}">제목</p>
                    <div>
                        <div class="titleInfo">
                            <p><i class="fa-regular fa-user"></i> 작성자</p>
                            <p th:text="${notice.username}">Username</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <p><i class="fa-regular fa-calendar"></i> 작성일</p>
                            <p th:text="${notice.noticeDate}">Date</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <p><i class="fa-regular fa-eye"></i> 조회수</p>
                            <p th:text="${notice.noticeHits}">Hits</p>
                        </div>
                    </div>
                </div>
                <div class="share"><div class="shareBtn link">"공유 아이콘 추가예정"</div></span></div>
            </div>
            <div class="noticeContent">
                <!-- 글 내용 -->
                <div class="content">
                    <p th:utext="${notice.noticeContent}">Content</p>
                </div>
                <!-- 첨부 파일 목록 -->
                <div class="attachments">
                    <h3>첨부 파일</h3>
                    <ul>
                        <li th:each="file : ${files}">
                            <a th:href="@{${file.filePath}}" th:text="${file.fileName}">File Name</a>
                        </li>
                    </ul>
                </div>
                <!-- 이전 글 링크 -->
                <div class="previous-post post-navigation" th:if="${prevNotice != null}">
                    <div>
                        <p>이전글</p>
                        <div class="arrow up"></div>
                        <a th:href="@{/media/noticeview(no=${prevNotice.noticeNum})}" th:text="${prevNotice.noticeTitle}">Previous Notice Title</a>
                    </div>
                </div>

                <!-- 목록으로 돌아가기 버튼 -->
                <div class="formBtns">
                    <a id="default_butt" href="/media/notice" class="btn btn-default">목록</a>
                </div>
            </div>
        </div>
    </div>
</div>
<footer>
    <th:block th:include="layout/footer"></th:block>
</footer>
</body>
</html>
