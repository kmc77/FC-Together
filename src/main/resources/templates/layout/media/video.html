<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
     <meta charset="UTF-8">
     <title>notice</title>
    <link href="/css/layout/media/video.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="container">
    <div class="videoPage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>영상</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="/media/all" class="tabLink">
                        <span>전체</span>
                    </a>
                    <a href="/media/notice"
                       aria-current="page">
                        <span>공지사항</span>
                    </a>
                    <a href="/media/news" class="tabLink">
                        <span>구단소식</span>
                    </a>
                    <a href="/media/photo" class="tabLink">
                        <span>구단사진</span>
                    </a>
                    <a href="/media/video" class="tabLink router-link-exact-active router-link-active current">
                        <span>영상</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="list-contents">
            <div class="video-container">
                <div class="video-board">
                    <div class="video-item-container">
                        <!-- <div class="news-detail">
                             <div class="news-thumbnail" style="background-image: url('https://static.mims.kr/upload/suG3cOmTNpBUkM72CCXX20230925014050817314.jpg');"></div>
                             <div class="news-contents">
                                 <div class="news-title">
                                     <p id="news-title"></p> &lt;!&ndash; 수정: id 값을 추가했습니다. &ndash;&gt;
                                 </div>
                                 <div class="news-date" id="news-date"> &lt;!&ndash; 수정: id 값을 추가했습니다. &ndash;&gt;
                                 </div>
                             </div>
                         </div>-->

                    </div>
                </div>
                <div class="formBtns">
                    <button id="loadMore" class="btn btn-more">More</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        var limit = 9; // 한 번에 로드할 비디오의 최대 개수
        var start = 0; // 시작 지점
        // 현재 활성화된 탭의 href 저장하는 변수 추가
        var activeTabHref = $(".tabLink.router-link-exact-active.router-link-active.current").attr("href");

        loadVideoList(start, limit); // 초기 비디오 목록 로딩

        $("#loadMore").click(function() {
            start += limit; // 다음 비디오 목록의 시작 지점 업데이트
            loadVideoList(start, limit); // 추가 비디오 목록 로딩
        });

        // 탭 클릭 이벤트 처리 개선
        $("body").on("click", ".tabLink", function(e) {
            var clickedTabHref = $(this).attr("href");

            // 현재 활성화된 탭과 클릭된 탭이 같은 경우 이벤트 중단
            if (activeTabHref === clickedTabHref) {
                e.preventDefault(); // 중복 요청 방지
                return;
            }

            e.preventDefault();
            activeTabHref = clickedTabHref; // 클릭된 탭의 href로 현재 활성화된 탭 업데이트

            // AJAX 요청으로 페이지의 일부만 동적으로 변경
            $.ajax({
                url: clickedTabHref,
                type: 'get',
                success: function(response) {
                    $("#content").html(response);
                    history.pushState({}, null, clickedTabHref);
                }
            });
        });

        function loadVideoList(start, limit) {
            // 비디오 목록 조회 로직 유지
            $.ajax({
                url: '/media/video/list',
                type: 'GET',
                data: {
                    start: start,
                    limit: limit
                },
                dataType: 'json',
                success: function(videoList) {
                    if (videoList.length === 0) {
                        alert('더 이상 표시할 비디오가 없습니다.');
                        return;
                    }

                    // 비디오 목록 초기화 및 추가
                    if (start === 0) $('.video-item-container').empty();

                    videoList.forEach(function(video) {
                        // 비디오 아이템 추가 로직 유지
                        let thumbnailUrl = '/img/FcTogether.jpg'; // Default thumbnail URL
                        if (video.mvTheOriginUrl) {
                            let urlParts = video.mvTheOriginUrl.split('/');
                            let videoKey = urlParts[urlParts.length - 1];
                            thumbnailUrl = `https://img.youtube.com/vi/${videoKey}/mqdefault.jpg`;
                        }

                        let videoItem = `<a href="/media/videoView?no=${video.cvIdx}">
                            <div class="video-detail">
                                <div class="video-thumbnail" style="background-image: url('${thumbnailUrl}');"></div>
                                <div class="video-contents">
                                    <div class="video-title">${video.cvTitle}</div>
                                    <div class="video-date-and-hits">${video.cvDate} • ${video.cvHits}</div>
                                    <div class="video-table">${video.tableGb}</div>
                                </div>
                            </div>
                        </a>`;
                        $('.video-item-container').append(videoItem);
                    });
                },
                error: function(error) {
                    console.error('비디오를 가져오는데 실패했습니다.', error);
                }
            });
        }
    });
</script>

</body>
</html>
