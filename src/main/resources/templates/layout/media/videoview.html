<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>video</title>
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <th:block th:include="layout/header"></th:block>
    <link href="/css/layout/media/videoview.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="newsWrapper newsContainer">
    <div class="mediaRoomContainer">
        <div class="mediaRoomContents">
            <div class="videoInformation">
                <div class="titleBox">
                    <p th:text="${clubVideo.cvTitle}">비디오 제목</p>
                    <div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-user"></i>
                            <p>작성자</p>
                            <p th:text="${clubVideo.username}">Username</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-calendar"></i>
                            <p>작성일</p>
                            <p th:text="${clubVideo.cvDate}">Date</p>
                        </div>
                        <div class="line"></div>
                        <div class="titleInfo">
                            <i class="fa-regular fa-eye"></i>
                            <p>조회수</p>
                            <p th:text="${clubVideo.cvHits}">Hits</p>
                        </div>
                    </div>
                </div>
                <div class="share">
                    <div class="shareOptions">
                        <a href="#" id="copy-link"><i class="fa-solid fa-copy"></i></a>
                        <p class="copy-success-message" id="copy-success-message">링크가 복사되었습니다.</p>
                    </div>
                </div>
            </div>
            <div class="cvContent">
                <div class="content">
                    <iframe id="videoPlayer" width="1000" height="720" th:src="${clubVideo.mvTheOriginUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    <p th:utext="${clubVideo.cvContent}">Video Content</p>
                </div>
                <div class="previous-post post-navigation" th:if="${prevClubVideo != null}">
                    <div>
                        <p>이전글</p>
                        <div class="arrow up"></div>
                        <a class="title" th:href="@{/media/videoView(no=${prevClubVideo?.cvIdx})}" th:text="${prevClubVideo?.cvTitle}">이전글 제목</a>
                    </div>
                </div>
                <div class="formBtns">
                    <a id="default_butt" href="/media/video" class="btn btn-default">목록</a>
                </div>
            </div>
        </div>
    </div>
</div>
<footer>
    <th:block th:include="layout/footer"></th:block>
</footer>

<script>
    $(document).ready(function() {
        $('#copy-link').click(function() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(function() {
                $('#copy-success-message').fadeIn().delay(1000).fadeOut();
            }, function(err) {
                $('#copy-success-message').text('링크 복사에 실패했습니다.').fadeIn().delay(1500).fadeOut();
            });
        });
    });
</script>
</body>
</html>
