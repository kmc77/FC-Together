                    <p th:utext="${clubVideo.cvContent}"></p>

                <div class="previous-post post-navigation">
                    <div><p>이전글</p>
                        <div class="arrow up"></div>
                        <a class="title" th:href="@{/media/videoview(no=${prevVideo.cvIdx})}" th:text="${prevVideo.cvTitle}">이전글 제목</a>
                    </div>
                </div>

                    <a id="default_butt" href="http://localhost:8081/media/notice" class="btn btn-default">목록</a>
                </div>
            </div>
        </div>
    </div>
<script>
    $(document).ready(function() {
    // URL에서 photoNum 추출
    var urlParams = new URLSearchParams(window.location.search);
    var videoIdx = urlParams.get('no');

    // cvIdx 해당하는 사진 정보 로드
    $.ajax({
        url: '/media/videoview?no=' + cvIdx,
        type: 'GET',
        dataType: 'json',
        success: function(data) {
            // 서버에서 반환한 데이터를 사용하여 뉴스의 제목, 날짜, 내용을 업데이트
            $('.videoInformation .titleBox p').text(data.cvTitle);
            $('.titleInfo p').eq(1).text(data.username);
            $('.titleInfo p').eq(3).text(data.cvDate);
            $('.titleInfo p').eq(5).text(data.cvHits);
            $('.cvContent .content').html(data.cvContent);
        },
        error: function(jqXHR, textStatus, errorThrown) {
            console.log(textStatus, errorThrown);
        }
    });

 $.ajax({
    url: '/media/videoview?no=' + (cvIdx - 1), // 이전글 번호
    type: 'GET',
    dataType: 'json',
    success: function(data) {
        if(data.prevVideo == null) { // 이전 사진이 없는 경우
            alert("이전글 없음");
        } else {
            // 서버에서 반환한 데이터를 사용하여 이전 글의 제목을 업데이트
            var titleLink = '<a href="/media/prevVideo?no=' + data.prevVideo.cvIdx + '">' + data.prevVideo.cvTitle + '</a>';
            $('.sc-bUTAii iQdlyk .title').html(titleLink);
        }
    },
    error: function(jqXHR, textStatus, errorThrown) {
        console.log(textStatus, errorThrown);
    }
});


});
</script>
