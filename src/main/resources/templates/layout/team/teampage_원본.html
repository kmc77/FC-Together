<script>
    'use strict';

     var waveBtnInit = function () {
         // 메인 탭과 서브 탭을 모두 선택
         var mainTabs = document.querySelectorAll('.main-tab.wave');
         var subTabs = document.querySelectorAll('.sub-tab.wave');
         var mainIndicator = document.querySelector('.tab-bar .indicator');
         var subIndicator = document.querySelector('.sub-tab-bar .sub-indicator');

         // 인디케이터 위치 업데이트 함수
         function updateIndicator(indicator, index, tabType, tabs) {
             // 탭의 전체 길이와 간격 계산
             var totalWidth = tabs.length * tabs[0].offsetWidth; // 탭의 개수 * 탭 하나의 너비
             var tabWidth = tabs[0].offsetWidth; // 탭 하나의 너비
             var offset = (totalWidth - tabWidth) / (tabs.length - 1); // 간격 계산
             var marginLeft = index * offset; // 인디케이터의 왼쪽 여백 계산

             // 인디케이터 위치 및 크기 업데이트
             indicator.style.width = tabWidth + 'px'; // 인디케이터 너비 업데이트
             indicator.style.marginLeft = marginLeft + 'px'; // 인디케이터 왼쪽 여백 업데이트
         }

         // 탭 클릭 이벤트 핸들러
         function addWaveEffect(tabs, indicator, tabType) {
             tabs.forEach(function(tab, index) {
                 tab.addEventListener('click', function(e) {
                     var newRound = document.createElement('div');
                     var x = e.pageX - tab.offsetLeft;
                     var y = e.pageY - tab.offsetTop;

                     newRound.className = 'cercle anim';
                     newRound.style.left = x + "px";
                     newRound.style.top = y + "px";
                     tab.appendChild(newRound);

                     // 인디케이터 위치 업데이트
                     updateIndicator(indicator, index, tabType, tabs);

                     // 애니메이션이 완료된 후 newRound 요소 제거
                     setTimeout(function() {
                         newRound.remove();
                     }, 1200);
                 });
             });
         }

         // 메인 탭과 서브 탭에 대한 이벤트 리스너 추가
         addWaveEffect(mainTabs, mainIndicator, 'main');
         addWaveEffect(subTabs, subIndicator, 'sub');
     };

     // 페이지 로드 시 함수 실행
     waveBtnInit();




  $(document).ready(function() {
    $('.main-tab').on('click', function() {
        var selectedTabNum = $(this).data('num');
        clearTableData(); // 테이블 데이터를 지우는 함수 호출
        loadPlayerData(selectedTabNum); // 선수 데이터 로드 함수 호출

        // 서브 탭 중 data-num="1"인 탭을 자동으로 클릭하도록 처리
        $('.sub-tab[data-num="1"]').click();

        // 서브 탭 정보 초기화 코드 추가
        resetSubTabInfo();

        // 메인 탭 클릭 시 해당 탭 위치로 스크롤 다운
        $('html, body').animate({
            scrollTop: $(this).offset().top
        }, 900); // 500ms 동안 스크롤 다운 애니메이션
    });

    // 서브 탭 클릭 이벤트 리스너
    $('.sub-tab').on('click', function() {
        var selectedSubTabNum = $(this).data('num');
        filterPlayersByPosition(selectedSubTabNum); // 포지션별 선수 보이기/가리기 처리 함수 호출
    });

    // 메인 탭 클릭 시 서브 탭 정보 초기화 함수
    function resetSubTabInfo() {
        // 서브 탭의 모든 섹션을 숨기고 첫 번째 서브 탭을 활성화
        $('.team-member.section').hide();
        $('.sub-tab[data-num="1"]').click();

        // 모든 선수 섹션을 보이게 함으로써 포지션별 필터링 상태 초기화
        $('.team-member.section').show();
    }

    function loadPlayerData(tabNum) {
        var playerTypes;
        switch(tabNum) {
            case 1:
                playerTypes = ['k5'];
                break;
            case 2:
                playerTypes = ['k7'];
                break;
            case 3:
                playerTypes = ['w1'];
                break;
            case 4:
                playerTypes = ['t1'];
                break;
            default:
                playerTypes = [];
        }

        playerTypes.forEach(function(playerType) {
            addPlayersToTable(playerType, tabNum);
        });
    }

       function addPlayersToTable(playerType, tabNum) {
        var accessToken = localStorage.getItem('accessToken');

        $.ajax({
            url: "/team/layout/get_" + playerType + "PlayerInfo",
            method: "GET",
            headers: {
                "Authorization": "Bearer " + accessToken
            },
            success: function(data) {
                var players = data; // 서버로부터 받은 플레이어 데이터
                var playersByPosition = {}; // 포지션별로 플레이어를 분류하기 위한 객체

                // 플레이어 데이터를 순회하면서 포지션별로 분류
                $.each(players, function(i, player) {
                    var position = player[playerType + 'PlayerPosition']; // 플레이어의 포지션
                    if (!playersByPosition[position]) {
                        playersByPosition[position] = []; // 해당 포지션을 처음 만나면 배열 초기화
                    }
                    playersByPosition[position].push(player); // 해당 포지션 배열에 플레이어 추가
                });

                // 포지션별로 팀 멤버 섹션 생성 전, 포지션 순서를 GK, DF, MF, FW 순으로 정렬합니다.
                var orderedPositions = ['GK', 'DF', 'MF', 'FW'];
                orderedPositions.forEach(function(position) {
                    var players = playersByPosition[position];
                    if (players) {
                        var sectionHtml = `
                            <section class="team-member section">
                                <h3 class="title title--underline">${position}</h3>
                                <ul class="team-member__list">
                        `;

                        // 포지션별 플레이어 목록 생성
                        $.each(players, function(i, player) {
                            var defaultImg = "/img/playersimg/" + playerType + "/test2.jpeg";
                            var playerImgSrc = player[playerType + 'filePath'] ? "/wp-content/uploads/player_photo/1/" + player[playerType + 'filePath'] + ".png" : defaultImg;
                            var playerHtml = `
                                <li class="team-member__item">
                                    <a class="team-member__link" href="/en/topteam/detail/?id=${player[playerType + 'PlayerNum']}">
                                        <div class="team-member__img-holder">
                                            <img class="team-member__img lozad"
                                                 src="${playerImgSrc}"
                                                 data-src="${playerImgSrc}"
                                                 alt="${player[playerType + 'PlayerEnName']}"
                                                 data-loaded="true">
                                        </div>
                                        <div class="team-member__data">
                                            <div class="team-member__data-unit">
                                                <p class="team-member__number">${player[playerType + 'PlayerNum']}</p>
                                                <p class="team-member__position">${player[playerType + 'PlayerPosition']}</p>
                                            </div>
                                            <div class="team-member__data-unit">
                                                <p class="team-member__name-ja" wovn-ignore="true">${player[playerType + 'PlayerName']}</p>
                                                <p class="team-member__name-en">${player[playerType + 'PlayerEnName']}</p>
                                                <p class="team-member__text">${player[playerType + 'PlayerBirth']}<br>${player[playerType + 'PlayerHeight']} / ${player[playerType + 'PlayerWeight']}</p>
                                            </div>
                                        </div>
                                    </a>
                                </li>
                            `;
                            sectionHtml += playerHtml; // 섹션 HTML에 플레이어 HTML 추가
                        });

                        sectionHtml += `
                                </ul>
                            </section>
                        `;

                        // 생성된 섹션 HTML을 문서에 추가
                        $('.tab__content').append(sectionHtml);
                    }
                });
           }
        });
    }


     function clearTableData() {
        // .tab__content 내부의 HTML을 비웁니다.
        $('.tab__content').empty();
    }

     function filterPlayersByPosition(positionNum) {
        // 모든 섹션을 숨깁니다.
        $('.team-member.section').hide();

        // 포지션에 맞는 섹션만 보여줍니다.
        var positionMap = {1: 'GK', 2: 'DF', 3: 'MF', 4: 'FW'};
        var selectedPosition = positionMap[positionNum];
        $('.team-member.section').each(function() {
            var section = $(this);
            if (section.find('.title--underline').text() === selectedPosition) {
                section.show();
            }
        });
     }

    loadPlayerData(1); // 페이지 로딩 시 1번 탭에 해당하는 데이터 자동 로드
});

</script>
