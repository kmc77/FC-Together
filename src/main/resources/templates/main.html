<script>
    <!--    섹션1-->
         $(document).ready(function(){
            $('.fade').slick({
                infinite: true,
                speed: 800,
                fade: true,
                cssEase: 'linear',
                autoplay: true,
                autoplaySpeed: 3000
            });

            $('.fade').on('click', function(){
                $('.fade').slick('slickNext');
            });
        });
    <!--    섹션2-->
         let currentIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        const sliderWrapper = document.querySelector('.slider-wrapper');

        function showSlide(index) {
            if (index < 0 || index >= totalSlides) {
                return;
            }

            const translateValue = -index * 100 + '%';
            sliderWrapper.style.transform = 'translateX(' + translateValue + ')';
            currentIndex = index;
        }

        function prevSlide1() {
            showSlide(currentIndex - 1);
        }

        function nextSlide1() {
            showSlide(currentIndex + 1);
        }

        let currentIndex2 = 0;
        const slides2 = document.querySelectorAll('.slide2');
        const totalSlides2 = slides2.length;
        const sliderWrapper2 = document.querySelector('.slider-wrapper2');

        function showSlide2(index) {
            if (index < 0 || index >= totalSlides2) {
                return;
            }

            const translateValue2 = -index * 100 + '%';
            sliderWrapper2.style.transform = 'translateX(' + translateValue2 + ')';
            currentIndex2 = index;
        }

        function prevSlide2() {
            showSlide2(currentIndex2 - 1);
        }

        function nextSlide2() {
            showSlide2(currentIndex2 + 1);
        }


    <!--    섹션3-->
        console.clear();

    // animation on scroll
    AOS.init({
        duration:800,
        easing: 'ease',
    });


    $('.v-story-slider').slick({
        dots:true,
        draggable:false,
        arrows:true,
        adaptiveHeight:true,
        centerMode:true,
        centerPadding:'300px',
        responsive: [
            {
              breakpoint: 1440,
              settings: {
                centerPadding:'20vw',
              }
            },
            {
              breakpoint: 770,
              settings: {
                centerPadding:'0',
                arrows:false,
              }
            },
        ],
    }).on('beforeChange', function(event, slick, currentSlide, nextSlide) {
        /* 자바스크립트
        if (currentSlide !== nextSlide) {
            document.querySelectorAll('.slick-center + .slick-cloned').forEach((next) => {
                // timeout required or Slick will overwrite the classes
                setTimeout(() => next.classList.add('slick-current', 'slick-center'));
            });
        }
        */
        // IE 호환성을 고려한 제이쿼리
        if (currentSlide !== nextSlide) {
            $('.slick-center + .slick-cloned').each(function(index, node) {
                var $node = $(node);

                setTimeout(function() {
                    $node.addClass('slick-current');
                    $node.addClass('slick-center');
                });
            });
        }
    });

    <!--    섹션4-->
         $(document).ready(function () {
        showTab('all');
    });

    function showTab(tabName) {
        $('.tab-content').removeClass('active');
        $('#' + tabName + '-content').addClass('active');
    }

    $(document).ready(function() {
    var firstTabPosition = { left: 0 };
    var firstTabWidth = 0;

    $("#nav-1 .slide1").css({ opacity: 0, left: firstTabPosition.left, width: firstTabWidth });

    $("#nav-1 a").on("click", function() {
        var position = $(this).parent().position();
        var width = $(this).parent().width();
        $("#nav-1 .slide1").css({ opacity: 1, left: position.left, width: width });
    });

    $("#nav-1 a").on("mouseover", function() {
        var position = $(this).parent().position();
        var width = $(this).parent().width();
        $("#nav-1 .slide2").css({
            opacity: 1, left: position.left, width: width
        }).addClass("squeeze");
    });

    $("#nav-1 a").on("mouseout", function() {
        $("#nav-1 .slide2").css({ opacity: 0 }).removeClass("squeeze");
    });
});

</script>
