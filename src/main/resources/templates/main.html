<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <link th:href="@{/css/main/main.css}" rel="stylesheet"/>
    <th:block th:include="layout/header"></th:block>
</head>
<body>
<div class="body">
    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225000752.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test1</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225301988.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test2</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225459830.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test3</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225719222.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test3</div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <div class="matchSchedule">
        <div class="matchImgDiv">
            <img src="/img/FcTogether.jpg" alt="" class="matchImg">
            <div class="pastMatch">
                <h4 class="matchResult">지난 경기 결과</h4>
                <div class="slider-container">
                    <div class="slider-wrapper">
                        <div class="slide">matchResult1</div>
                        <div class="slide">matchResult2</div>
                        <div class="slide">matchResult3</div>
                    </div>
                </div>

                <button onclick="prevSlide()"> < </button>
                <button onclick="nextSlide()"> > </button>
            </div>

            <div class="nextMatch">
                <h4 class="nextSchedule">다음 경기 일정</h4>
                <div class="slider-container2">
                    <div class="slider-wrapper2">
                        <div class="slide2">nextMatch1</div>
                        <div class="slide2">nextMatch2</div>
                        <div class="slide2">nextMatch3</div>
                    </div>
                </div>
                    <button onclick="prevSlide2()"> < </button>
                    <button onclick="nextSlide2()"> > </button>
            </div>
        </div>
    </div>


</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper-container', {
        loop: true,
        autoplay: {
            delay: 4100,
        },
        speed: 500,
        slidesPerView: 1,
        spaceBetween: 7,
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
    });


     let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const sliderWrapper = document.querySelector('.slider-wrapper');

    function showSlide(index) {
        if (index < 0 || index >= totalSlides) {
            return;
        }

        const translateValue = -index * 100 + '%';
        sliderWrapper.style.transform = 'translateX(' + translateValue + ')';
        currentIndex = index;
    }

    function prevSlide() {
        showSlide(currentIndex - 1);
    }

    function nextSlide() {
        showSlide(currentIndex + 1);
    }

    let currentIndex2 = 0;
    const slides2 = document.querySelectorAll('.slide2');
    const totalSlides2 = slides2.length;
    const sliderWrapper2 = document.querySelector('.slider-wrapper2');

    function showSlide2(index) {
        if (index < 0 || index >= totalSlides2) {
            return;
        }

        const translateValue2 = -index * 100 + '%';
        sliderWrapper2.style.transform = 'translateX(' + translateValue2 + ')';
        currentIndex2 = index;
    }

    function prevSlide2() {
        showSlide2(currentIndex2 - 1);
    }

    function nextSlide2() {
        showSlide2(currentIndex2 + 1);
    }
</script>
</body>
</html>
