<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <link th:href="@{/css/main/main.css}" rel="stylesheet"/>
    <th:block th:include="layout/header"></th:block>
</head>
<body>
<div class="body">
    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225000752.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test1</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225301988.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test2</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225459830.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test3</div>
            </div>
            <div class="swiper-slide">
                <img th:src="@{img/KakaoTalk_20240201_225719222.jpg}" alt="" class="swiperImg">
                <div class="slide-text">Test3</div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
    <div class="matchSchedule">
        <div class="matchImgDiv">
            <img src="/img/FcTogether.jpg" alt="" class="matchImg">
            <div class="pastMatch">
                <h4 class="matchResult">지난 경기 결과</h4>
                <div class="swiper-container2">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <div class="matchResult1">
                                matchResult1
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="matchResult2">
                                matchResult2
                            </div>
                        </div>
                    </div>
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper-container', {
        loop: true,
        autoplay: {
            delay: 4100,
        },
        speed: 500,
        slidesPerView: 1,
        spaceBetween: 7,
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
    });

   const matchSwiper = new Swiper('.matchSchedule .swiper-container2', {
    loop: true,
    speed: 500,
    autoplay: false,
    slidesPerView: 1,
    spaceBetween: 7,
    navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
    },
    on: {
        slideChangeTransitionEnd: function () {
            const activeIndex = this.activeIndex;
            const matchResults = document.querySelectorAll('.matchSchedule .swiper-slide');

            matchResults.forEach((result, index) => {
                const parent = result.closest('.pastMatch');
                const zIndexValue = parent && index === activeIndex ? '2' : '1';
                result.style.zIndex = zIndexValue;

                const matchResult1 = result.querySelector('.matchResult1');
                const matchResult2 = result.querySelector('.matchResult2');

                matchResult1.style.zIndex = zIndexValue;
                matchResult2.style.zIndex = zIndexValue;

                // 부모 컨테이너에 기반하여 보이기/숨기기 처리
                matchResult1.style.display = parent && index === activeIndex ? 'none' : 'block';
                matchResult2.style.display = parent && index === activeIndex ? 'none' : 'block';
            });
        },
    },
});
</script>
</body>
</html>
