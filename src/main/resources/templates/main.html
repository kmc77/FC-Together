<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.swiper-container', {
        loop: true,
        autoplay: {
            delay: 4100,
        },
        speed: 500,
        slidesPerView: 1,
        spaceBetween: 7,
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
    });


     let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const sliderWrapper = document.querySelector('.slider-wrapper');

    function showSlide(index) {
        if (index < 0 || index >= totalSlides) {
            return;
        }

        const translateValue = -index * 100 + '%';
        sliderWrapper.style.transform = 'translateX(' + translateValue + ')';
        currentIndex = index;
    }

    function prevSlide() {
        showSlide(currentIndex - 1);
    }

    function nextSlide() {
        showSlide(currentIndex + 1);
    }

    let currentIndex2 = 0;
    const slides2 = document.querySelectorAll('.slide2');
    const totalSlides2 = slides2.length;
    const sliderWrapper2 = document.querySelector('.slider-wrapper2');

    function showSlide2(index) {
        if (index < 0 || index >= totalSlides2) {
            return;
        }

        const translateValue2 = -index * 100 + '%';
        sliderWrapper2.style.transform = 'translateX(' + translateValue2 + ')';
        currentIndex2 = index;
    }

    function prevSlide2() {
        showSlide2(currentIndex2 - 1);
    }

    function nextSlide2() {
        showSlide2(currentIndex2 + 1);
    }

 $(document).ready(function(){
      $('.center').slick({
        centerMode: true,
        centerPadding: '60px',
        slidesToShow: 3,
        responsive: [
          {
            breakpoint: 768,
            settings: {
              arrows: false,
              centerMode: true,
              centerPadding: '40px',
              slidesToShow: 3
            }
          },
          {
            breakpoint: 480,
            settings: {
              arrows: false,
              centerMode: true,
              centerPadding: '40px',
              slidesToShow: 1
            }
          }
        ]
      });
    });

    console.clear();

AOS.init({
    //once:true,
    duration:800,
    easing: 'ease',
});


$('.v-story-slider').slick({
    dots:true,
    draggable:false,
    arrows:true,
    adaptiveHeight:true,
    centerMode:true,
    centerPadding:'300px',
    responsive: [
        {
          breakpoint: 1440,
          settings: {
            centerPadding:'20vw',
          }
        },
        {
          breakpoint: 770,
          settings: {
            centerPadding:'0',
            arrows:false,
          }
        },
    ],
}).on('beforeChange', function(event, slick, currentSlide, nextSlide) {
    /* 자바스크립트
    if (currentSlide !== nextSlide) {
        document.querySelectorAll('.slick-center + .slick-cloned').forEach((next) => {
            // timeout required or Slick will overwrite the classes
            setTimeout(() => next.classList.add('slick-current', 'slick-center'));
        });
    }
    */

    if (currentSlide !== nextSlide) {
        $('.slick-center + .slick-cloned').each(function(index, node) {
            var $node = $(node);

            setTimeout(function() {
                $node.addClass('slick-current');
                $node.addClass('slick-center');
            });
        });
    }
});

</script>
