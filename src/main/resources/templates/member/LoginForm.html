<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LoginForm</title>
    <th:block th:include="layout/header"></th:block>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="memberPage">
<div id="app" class="">
    <div class="memberContent" id="content">
        <div class="container">
            <div class="memberBox">
                <div class="topTitle">
                    <p class="title">로그인</p>
                    <p class="subTitle">FC투게더<br>웹사이트 방문을 환영합니다.</p>
                </div>

                <!-- 로그인 폼 -->
                <form id="loginForm">
                    <div>
                        <input type="text" id="member_id" name="member_id" placeholder="아이디를 입력하세요" class="input">
                    </div>
                    <div class="formRow">
                        <input type="password" id="member_pw" name="member_pw" placeholder="비밀번호를 입력하세요" class="input">
                    </div>
                    <div class="formBtns formBtns2">
                        <button type="submit" class="btn large full primary1">로그인</button>
                    </div>
                    <!-- 컨트롤러로부터 전달받은 오류 메시지 표시 -->
                    <p th:if="${error}" class="error-message" th:text="${error}" style="color: red;"></p>
                </form>
                <div class="formBtns formBtns2 memberLinks">
                    <a href="/member/JoinForm" class="link">회원가입</a>
                    <a href="/member/findid" class="findid">아이디찾기</a>
                    <a href="/member/findpw" class="findpw">비밀번호찾기</a>
                </div>
                <div class="snsLogin">
                    <a href="javascript:void(0)" class="kakao">카카오<br>로그인</a>
                    <a href="javascript:void(0)" class="naver">네이버<br>로그인</a>
                </div>
                <div id="naver_id_login" style="display: none;">
                    <a href="https://nid.naver.com/oauth2.0/authorize?response_type=token&amp;client_id=0r3LoCZVmG5_zLbBSGFD&amp;redirect_uri=https%3A%2F%2Fhyundai-motorsfc.com%2Fmember%2Fsignin&amp;state=99b0385d-fd63-49d3-b1b0-6c0deb2d92da"
                       id="naver_id_login_anchor">
                        <img src="http://static.nid.naver.com/oauth/button_w.PNG" border="0" title="네이버 아이디로 로그인"
                             width="40" height="40">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    $(function() {
    // 아이디와 비밀번호 입력 상태를 확인하여 로그인 버튼 활성화/비활성화
    function checkInputStatus() {
      var username = $("input[name='member_id']").val();
      var password = $("input[name='member_pw']").val();
      var loginButton = $("button[type='submit']");

      if (username && password) {
        loginButton.prop("disabled", false);
      } else {
        loginButton.prop("disabled", true);
      }
    }

    // 입력 상태 변화 감지
    $("input[name='member_id'], input[name='member_pw']").on("input", function() {
      checkInputStatus();
    });

    // 로그인 버튼 클릭 이벤트 핸들러
    $("button[type='submit']").on("click", function(e) {
      e.preventDefault(); // 기본 폼 제출 동작 막기

      // 입력된 아이디와 비밀번호 가져오기
      var username = $("input[name='member_id']").val();
      var password = $("input[name='member_pw']").val();

      // 로그인 데이터를 JSON 형식으로 변환
      var loginData = {
        username: member_id,
        password: member_pw
      };

      // AJAX 요청으로 로그인 데이터 전송
      $.ajax({
        url: "/member/login",
        type: "POST",
        data: JSON.stringify(loginData), // JSON으로 변환하여 전송
        contentType: "application/json", // 데이터 타입을 JSON으로 설정
        beforeSend: function(xhr) {
          xhr.setRequestHeader("Authorization", "Bearer " + response.accessToken);
        },
        success: function(response) {
          // 로그인 성공 시 처리
          window.location.href = "/main"; // 메인 페이지로 리디렉션
        },
        error: function(jqXHR, textStatus, errorThrown) {
          // 요청 실패 또는 오류 발생 시 처리
          console.log("로그인 실패:", errorThrown); // 콘솔에 로그 출력
        }
      });
    });
  });

</script>

</body>
</html>
