<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LoginForm</title>
    <th:block th:include="layout/header"></th:block>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="memberPage">
<div id="app" class="">
    <div class="memberContent" id="content">
        <div class="container">
            <div class="memberBox">
                <div class="topTitle">
                    <p class="title">로그인</p>
                    <p class="subTitle">FC투게더<br>웹사이트 방문을 환영합니다.</p>
                </div>

                <!-- 로그인 폼 -->
                <form id="loginForm" action="/login" method="post">
                    <div>
                        <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" class="input">
                    </div>
                    <div class="formRow">
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" class="input">
                    </div>
                    <div class="formBtns formBtns2">
                        <button type="submit" class="btn large full primary1">로그인</button>
                    </div>
                    <!-- 컨트롤러로부터 전달받은 오류 메시지 표시 -->
                    <p th:if="${error}" class="error-message" th:text="${error}" style="color: red;"></p>
                </form>

                <div class="formBtns formBtns2 memberLinks">
                    <a href="/user/JoinForm" class="link">회원가입</a>
                    <a href="/member/findid" class="findid">아이디찾기</a>
                    <a href="/member/findpw" class="findpw">비밀번호찾기</a>
                </div>
                <div class="snsLogin">
                    <a href="/oauth2/authorization/google">구글<br>로그인</a>
                    <a href="/oauth2/authorization/naver">네이버<br>로그인</a>
                </div>
                <div id="naver_id_login" style="display: none;">
                    <a href="https://nid.naver.com/oauth2.0/authorize?response_type=token&amp;client_id=0r3LoCZVmG5_zLbBSGFD&amp;redirect_uri=https%3A%2F%2Fhyundai-motorsfc.com%2Fmember%2Fsignin&amp;state=99b0385d-fd63-49d3-b1b0-6c0deb2d92da"
                       id="naver_id_login_anchor">
                        <img src="http://static.nid.naver.com/oauth/button_w.PNG" border="0" title="네이버 아이디로 로그인"
                             width="40" height="40">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    $(function() {
        // 아이디와 비밀번호 입력 상태를 확인하여 로그인 버튼 활성화/비활성화
        function checkInputStatus() {
            var username = $("input[name='username']").val();
            var password = $("input[name='password']").val();
            var loginButton = $("button[type='submit']");

            if (username && password) {
                loginButton.prop("disabled", false);
            } else {
                loginButton.prop("disabled", true);
            }
        }

        // 입력 상태 변화 감지
        $("input[name='username'], input[name='password']").on("input", function() {
            checkInputStatus();
        });

        // 초기 상태에서도 로그인 버튼 상태 확인
        checkInputStatus();

        // 로그인 폼 제출 이벤트 핸들러
        $("#loginForm").submit(function(event) {
            event.preventDefault(); // 폼 제출 기본 동작 방지

            var username = $("input[name='username']").val();
            var password = $("input[name='password']").val();
            var loginData = {
                username: username,
                password: password
            };

            $.ajax({
                type: "POST",
                url: "/login",
                data: JSON.stringify(loginData),
                contentType: "application/json",
                xhrFields: {
                    withCredentials: true
                },
                success: function(data, status, xhr) {
                    console.log("로그인 성공:", data);
                    var jwt = xhr.getResponseHeader('Authorization');
                    localStorage.setItem('accessToken', jwt);
                    alert("로그인에 성공하였습니다.");
                    window.location.href = "/";
                },
                error: function(xhr, status, error) {
                    console.error("로그인 실패:", error);
                    if (xhr.responseJSON.statusCode === 404) {
                        alert("아이디와 비밀번호를 확인하여 주세요.");
                    } else {
                        alert("서버에 문제가 발생하였습니다.");
                    }
                }
            });
        });
    });
</script>


</body>
</html>
