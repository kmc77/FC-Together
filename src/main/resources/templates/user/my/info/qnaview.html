<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>QnaView</title>
    <th:block th:include="layout/header"></th:block>
    <link href="/css/user/my/info/qnaview.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

</head>
<body>

<!-- contents -->
<div id="contents" class="contents">
    <div class="layout-inner">
        <section class="qna-wrap view-wrap">
            <div class="cont-top-area">
                <h1 class="cont-tit">나의 1:1문의</h1>
                <p class="cont-txt notice-txt">답변 운영 시간은 09:00 ~ 18:00</p>
            </div>

            <div class="content-box">
                <div class="form-list view-list">
                    <input type="hidden" name="no" value="">
                    <div class="col">
                        <dl class="flex-align-center">
                            <dt id="date-label">등록일</dt>
                            <dd th:text="${qna.qnaDate}"></dd>
                        </dl>
                        <dl>
                            <dt id="status-label">상태</dt>
                            <dd>
                                <span class="badge-answer" th:text="${qna.qnaStatus}"></span>
                            </dd>
                        </dl>
                    </div>

                    <dl>
                        <dt id="title-label">문의내용</dt>
                        <dd>
                            <em class="qna-cont-tit" th:text="${qna.qnaTitle}"></em>
                            <div class="qna-cont ql-editor" th:utext="${qna.qnaContent}"></div>
                        </dd>
                    </dl>
                </div>
            </div>

            <div class="content-box">
                <div class="form-list">
                    <dl>
                        <dt>답변</dt>
                        <dd>답변 대기중입니다.</dd>
                    </dl>

                    <dl>
                        <dt id="authId-label">작성자 ID</dt>
                        <dd id="authId-content" th:text="${qna.authId}"></dd>
                    </dl>

                </div>
                <div class="formBtns">
                    <button type='button' value="삭제" class='btn btn-default' id='cancel_btn'>삭제</button>
                    <button type="button" onclick="location.href='http://localhost:8081/my/info/myprofile'"
                            class="btn btn-default">목록
                    </button>
                </div>
            </div>
        </section>
    </div>
</div>
<!-- // contents -->
<script>
    $(document).ready(function() {
     // URL에서 qnaNum을 추출
     var urlParams = new URLSearchParams(window.location.search);
     var qnaNum = urlParams.get('no');

     // qnaNum에 해당하는 문의글을 불러옴
   $.ajax({
    url: '/my/info/qnaview?no=' + qnaNum,
    type: 'GET',
    success: function(data) {
        // HTML 요소의 내용을 업데이트
        $('#date-label').next('dd').text(data.qnaDate);
        $('#status-label').next('dd').find('span').text(data.qnaStatus);
        $('#authId-content').text(data.authId);  // authId 값을 추가
        $('#title-label').next('dd').find('em').text(data.qnaTitle);
        $('.qna-cont').html(data.qnaContent);  // HTML로 된 내용이라면 .html() 메서드를 사용

        // 답변이 있으면 답변을 보여주고, 없으면 "답변 대기중입니다."라는 메시지를 보여줌
        if (data.qnaReply) {
            $('#reply-label').text(data.qnaReply);
        } else {
            $('#reply-label').text('답변 대기중입니다.');
        }
    },
    error: function(xhr, status, error) {
        console.error('QnA 상세 정보 불러오기 요청 실패: ' + error);
    }
});

 });

</script>

</body>
</html>
