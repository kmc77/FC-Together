<!DOCTYPE html>
<html lang="" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyProfile</title>
    <th:block th:include="layout/header"></th:block>
    <link href="/css/user/my/MyProfile.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

</head>
<body>
<div class="container">
    <div class="mypagePage" id="content">
        <div class="subTop">
            <div class="top">
                <div class="container">
                    <div class="topTitle">
                        <p class="title">
                            <span class="mobileBreak"><strong></strong>님</span> 안녕하세요!
                        </p>
                    </div>
                </div>
            </div>
            <div class="tabMenu">
                <div class="container">
                    <a href="#" data-target="#mypage" class="tabLink current">
                        <span>마이페이지</span>
                    </a>
                    <a href="#" data-target="#qna" class="tabLink">
                        <span>1:1 문의하기</span>
                    </a>
                    <a href="#" data-target="#myinfo" class="tabLink">
                        <span>나의정보 수정</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="mypage" class="tabContent">
        <div class="content">
            <div class="listInfo">
                <h2>마이페이지</h2>
                <div id="userProfile">
                    <p id="username"></p>
                    <p id="email"></p>
                </div>
            </div>
        </div>
    </div>


    <div id="qna" class="tabContent" style="display: none;">
        <div id="scrollAnchor" class="container">
            <div islogin="true" reservedata="[object Object]" class="content">
                <div class="qnaList">
                    <!-- 여기에 문의글 목록 노출 -->
                </div>
                <div class="qnaWrite" style="display:none;">
                    <div class="listInfo">
                        <div class="title">1:1 문의하기 작성</div>
                    </div>
                    <div>
                        <div class="writeTable">
                            <div class="row">
                                <div class="label">제목</div>
                                <div class="cont">
                                    <input placeholder="제목을 입력하세요" maxlength="50" class="input">
                                    <div class="letter"><strong id="titleCount">0/50</strong></div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="label">내용</div>
                                <div class="cont">
                            <textarea placeholder="내용을 입력하세요" oninput="updateCount(this, 'contentCount')"
                                      class="input textarea" maxlength="500"></textarea>
                                    <div class="letter"><strong id="contentCount">0/500</strong></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btns">
                    <button class="btn primary w190 medium" id="showQnaList">문의글 목록 보기</button>
                    <button class="btn primary w190 medium" id="showQnaForm">1:1 문의하기</button>
                    <button class="btn primary w190 medium" id="submitQna">작성완료</button>
                </div>
            </div>
        </div>
    </div>
    <div id="myinfo" class="tabContent" style="display: none;">
        <p>나의정보 수정 예시 텍스트</p>
    </div>
</div>




<script>
    $(document).ready(function() {
        var token = localStorage.getItem('accessToken');
        if (token) {
            $.ajax({
                url: '/info/list',
                type: 'GET',
                beforeSend: function(xhr) {
                    xhr.setRequestHeader('Authorization', token);
                },
                success: function(response) {
                    $('.qnaList').empty(); // 기존에 있던 글 목록 제거
                    if (response.length > 0) {
                        for (var i = 0; i < response.length; i++) {
                            var qna = response[i];
                            var qnaElement = '<div><h2>' + qna.qnaTitle + '</h2><p>' + qna.qnaContent + '</p></div>';
                            $('.qnaList').append(qnaElement); // 새로운 글 추가
                        }
                        $('.qnaList').show(); // 조회글이 있으면 qnaList 보여주기
                        $('.qnaWrite').hide(); // qnaWrite 숨기기
                        $("#showQnaForm").show(); // '1:1 문의하기' 버튼 보여주기
                        $("#showQnaList").hide(); // '문의글 목록 보기' 버튼 숨기기
                        $("#submitQna").hide(); // '작성완료' 버튼 숨기기
                    }
                },
                error: function(xhr, status, error) {
                    console.log(error);
                }
            });

            // 1:1 문의하기 버튼 클릭 이벤트
            $("#showQnaForm").click(function() {
                $('.qnaWrite').show(); // qnaWrite 보여주기
                $('.qnaList').hide(); // qnaList 숨기기
                $("#showQnaForm").hide(); // '1:1 문의하기' 버튼 숨기기
                $("#showQnaList").show(); // '문의글 목록 보기' 버튼 보여주기
                $("#submitQna").show(); // '작성완료' 버튼 보여주기
            });

            // 문의글 목록 보기 버튼 클릭 이벤트
            $("#showQnaList").click(function() {
                $('.qnaList').show(); // qnaList 보여주기
                $('.qnaWrite').hide(); // qnaWrite 숨기기
                $("#submitQna").hide(); // '작성완료' 버튼 숨기기
                $("#showQnaList").hide(); // '문의글 목록 보기' 버튼 숨기기
                $("#showQnaForm").show(); // '1:1 문의하기' 버튼 보여주기
            });

          $("#submitQna").click(function() {
            var title = $('.input').val();
            var content = $('.textarea').val();

            if (!title || !content) {
                alert('제목과 내용을 모두 입력해주세요.');
                return;
            }

            var token = localStorage.getItem('accessToken');

            $.ajax({
                url: '/info/qna',
                type: 'POST',
                data: {
                    qnaTitle: title,
                    qnaContent: content
                },
                beforeSend: function(xhr) {
                    xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                },
                success: function(response) {
                    console.log('글쓰기 요청 성공');
                    alert('글쓰기 요청이 성공했습니다.');
                    $('.qnaList').show(); // qnaList 보여주기
                    $('.qnaWrite').hide(); // qnaWrite 숨기기
                    $("#submitQna").hide(); // '작성완료' 버튼 숨기기
                    $("#showQnaList").hide(); // '문의글 목록 보기' 버튼 숨기기
                    $("#showQnaForm").show(); // '1:1 문의하기' 버튼 보여주기
                },
                error: function(xhr, status, error) {
                    console.error('글쓰기 요청 실패: ' + error);
                }
            });
        });

        }

        $('.input').on('input', function() {
            var $input = $(this);
            var maxLength = $input.is('textarea') ? 500 : 50;
            var currentLength = $input.val().length;
            var $counter = $input.siblings('.letter').find('strong');
            $counter.text(currentLength + '/' + maxLength);
            if (currentLength > maxLength) {
                $input.val($input.val().slice(0, maxLength));
                $counter.text(maxLength + '/' + maxLength);
            }
        });

        if (token) {
            $.ajax({
                url: '/user/user',
                type: 'GET',
                beforeSend: function(xhr) {
                    xhr.setRequestHeader('Authorization', token);
                },
                success: function(data) {
                    var username = data.username;
                    if (username) {
                        $('.mobileBreak strong').text(username);
                    }

                    $('#username').text("사용자 이름: " + data.username);
                    $('#email').text("이메일: " + data.email);
                },
                error: function(xhr, status, error) {
                }
            });
        }

        var activeTab = localStorage.getItem('activeTab');
        if (activeTab) {
            $('.tabContent').hide();
            $(activeTab).show();
            $('.tabMenu a').removeClass('current');
            $('a[data-target="' + activeTab + '"]').addClass('current');
        }

        $('.tabMenu a').click(function(e) {
            e.preventDefault();
            var target = $(this).attr('data-target');
            $('.tabContent').hide();
            $(target).show();
            $('.tabMenu a').removeClass('current');
            $(this).addClass('current');
            localStorage.setItem('activeTab', target);
        });
    });
</script>


</body>
</html>
